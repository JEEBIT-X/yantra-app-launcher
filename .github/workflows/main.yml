name: Build Yantra Pro

on: 
  workflow_dispatch:

# This hides the Node.js warning so it stops bothering you!
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Follow Step 4 (Create local.properties)
        run: |
          # This writes the keys EXACTLY as the developer instructions say
          echo 'weatherAPIkey="dummy_weather_key"' > local.properties
          echo 'backupPassword="dummy_backup_password"' >> local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Follow Step 5 & 6 (Build proDebug)
        run: |
          chmod +x gradlew
          ./gradlew assembleProDebug

      - name: Upload the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Yantra-Pro-APK
          path: app/build/outputs/apk/**/*.apk
