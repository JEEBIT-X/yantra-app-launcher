name: Build Yantra Pro

on: 
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build the Pro APK
        run: |
          # Create a dummy properties file to satisfy the code
          echo "WEATHER_API_KEY=dummy" > local.properties
          echo "BACKUP_PASSWORD=dummy" >> local.properties
          echo "NAGA_API_KEY=dummy" >> local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          
          chmod +x gradlew
          
          # Pass the specific placeholders that the Manifest is asking for
          ./gradlew assembleProDebug -PweatherAPIkey="dummy" -PbackupPassword="dummy"

      - name: Upload the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Yantra-Pro-APK
          path: app/build/outputs/apk/pro/debug/*.apk
